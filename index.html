<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador Topográfico 3D - Teresina</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #d9d9d9 0%, #bdbdbd 100%);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      background: radial-gradient(circle at center, #cfcfcf 0%, #9e9e9e 100%);
    }

    .info {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.88);
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
      max-width: 320px;
      backdrop-filter: blur(6px);
    }

    .info h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      color: #222;
    }

    .info p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.4;
      color: #444;
    }

    .creditos {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .info {
        top: 12px;
        left: 12px;
        right: 12px;
        max-width: unset;
      }

      .info h1 {
        font-size: 1rem;
      }

      .info p {
        font-size: 0.88rem;
      }

      .creditos {
        right: 12px;
        bottom: 12px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>

  <div class="info">
    <h1>Visualizador Topográfico 3D</h1>
    <p>
      Modelo tridimensional do terreno de Teresina para visualização online.
      Use o mouse ou o toque na tela para girar, aproximar e explorar o relevo.
    </p>
  </div>

  <model-viewer
    src="teresinav2.glb"
    alt="Modelo 3D topográfico de Teresina"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="20deg"
    shadow-intensity="1"
    exposure="1.1"
    environment-image="neutral"
    interaction-prompt="auto"
    loading="eager"
    reveal="auto"
    ar
  >
  </model-viewer>

  <div class="creditos">
    Projeto cartográfico online
  </div>
</body>
</html>
